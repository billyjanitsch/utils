name: CI

on: push

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
